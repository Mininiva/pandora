<script>
'use strict';
// ================================================================
//  PANDORA · TIDAL POOL (biome-06) · Three.js 3D
//  Chemistry: UV · NaCl · organic · tidal
// ================================================================

// ── BIOME CONFIG (unique per biome) ─────────────────────────────
const BC = {
  id:          '06',
  name:        'Tidal Pool',
  tierNames: [
    'Void',
    'Salt Contact',
    'Ion Bond',
    'Organic Chain',
    'Branched Polymer',
    'UV-Catalytic Ring',
    'Ionic Cluster',
    'UV Cascade',
    'Amphiphilic Order',
    'Core-Shell',
    'Compartment',
    'Proto-Division',
    'Inheritance',
    'Colony',
    'Differentiation',
    'Signalling',
    'Memory',
    'Symbiosis',
    'Metabolism',
    'Directed Motion',
    '✦ Sentience'
  ],
  // World physics
  worldR:      86,
  nBase:       390,
  thermalNoise:0.22,
  bondCut:     19,
  bondSpring:  0.11,
  bondRest:    11,
  bondBreak:   25,
  wallK:       0.1,
  bondRate:    0.0052,
  ljSig:       7.2,
  // Particle types: [symbol, color, radius, maxBonds]
  types: [
    ['NA+', 0xf8e840, 3.2, 2],
    ['CL-', 0x40d0d0, 3.2, 2],
    ['ORG', 0x78e850, 3.8, 4],
    ['UVR', 0xffffff, 2.5, 3]
  ],
  // Type ratios
  ratios: [0.25, 0.25, 0.30, 0.20],
  // Affinity matrix [typeA][typeB]
  affinity: [
    [0.05, 0.70, 0.20, 0.30],
    [0.70, 0.05, 0.25, 0.25],
    [0.20, 0.25, 0.50, 0.55],
    [0.30, 0.25, 0.55, 0.20]
  ],
  // Visuals
  bgColor:     0x020c10,
  fogDensity:  0.0024,
  ambientColor:0x082028,
  ambientInt:  1.4,
  sunColor:    0x80e0d0,
  sunInt:      1.8,
  fillColor:   0x103040,
  bondColor:   0x208070,
  cameraZ:     137,
  rotateSpeed: 0.3,
};

// ── SHARED 3D ENGINE ─────────────────────────────────────────────
// (identical code in every biome — only BC above changes)
const BIOME_ID   = BC.id;
const BIOME_NAME = BC.name;

firebase.initializeApp({
  apiKey:'AIzaSyANFCI2Uyehrezru2TxZ8jOP_V9lVSYkGA',
  authDomain:'pandora-68637.firebaseapp.com',
  databaseURL:'https://pandora-68637-default-rtdb.firebaseio.com',
  projectId:'pandora-68637',
  storageBucket:'pandora-68637.firebasestorage.app',
  messagingSenderId:'244482446708',
  appId:'1:244482446708:web:7bec4962611f8c4a224821',
});
const db   = firebase.database();
const ROOT = `pandora/biomes/${BIOME_ID}`;

// THREE.js scene
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
Object.assign(renderer.domElement.style,{position:'fixed',top:'0',left:'0',width:'100%',height:'100%',zIndex:'0'});
document.body.insertBefore(renderer.domElement,document.body.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(BC.bgColor);
scene.fog = new THREE.FogExp2(BC.bgColor, BC.fogDensity);

const camera = new THREE.PerspectiveCamera(52,window.innerWidth/window.innerHeight,0.5,2000);
camera.position.set(0,50,BC.cameraZ);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.04;
controls.minDistance=60; controls.maxDistance=600;
controls.autoRotate=true; controls.autoRotateSpeed=BC.rotateSpeed;

scene.add(new THREE.AmbientLight(BC.ambientColor, BC.ambientInt));
const sun = new THREE.DirectionalLight(BC.sunColor, BC.sunInt);
sun.position.set(100,180,140); scene.add(sun);
const fill = new THREE.DirectionalLight(BC.fillColor, 0.5);
fill.position.set(-90,-70,-120); scene.add(fill);

// World boundary
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(BC.worldR,32,24),
  new THREE.MeshBasicMaterial({color:0x1a3050,wireframe:true,transparent:true,opacity:0.06})
));

// Bond lines
const MAX_BL=1200;
const bPos=new Float32Array(MAX_BL*6);
const bGeo=new THREE.BufferGeometry();
bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
bGeo.setDrawRange(0,0);
const bLines=new THREE.LineSegments(bGeo,new THREE.LineBasicMaterial({color:BC.bondColor,transparent:true,opacity:0.45}));
scene.add(bLines);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// Particle geometry cache
const sGeos = BC.types.map(t=>new THREE.SphereGeometry(t[2],10,8));
const sMats = BC.types.map(t=>new THREE.MeshPhongMaterial({
  color:t[1], emissive:new THREE.Color(t[1]).multiplyScalar(0.12), shininess:60
}));

// ── STATE ──────────────────────────────────────────────────────
let particles=[]; let _tick=0; let uiTick=0;
let currentTier=0; let currentGen=1;
let tierAchieved=new Array(21).fill(false);
let tierHistory=[]; let _isDead=false; let _deathRunning=false;
let _lastComps=[]; let _lastMaxClus=0; let _lastTotalBd=0; let _lastClosed=false;
let discoveredStructures=new Map();
let _genome={n1:1,n2:1,n3:1,noiseScale:1};
function _clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function defGenome(){return{n1:1,n2:1,n3:1,noiseScale:1};}
function _evolveGenome(archives,g){
  const ng={...g};
  if(!archives||!archives.length) return ng;
  const maxH=Math.max(...archives.map(a=>a.maxTier||0));
  const last=archives[archives.length-1];
  const ms=(last.maxTier>=maxH&&last.maxTier>=4)?0.015:0.08;
  const mu=()=>1+(Math.random()-0.5)*2*ms;
  ['n1','n2','n3','noiseScale'].forEach(k=>{ng[k]=_clamp((ng[k]||1)*mu(),0.4,2.2);});
  const avg=archives.reduce((s,a)=>s+(a.maxTier||0),0)/archives.length;
  if(avg<6) ng.n1=_clamp(ng.n1*1.04,0.4,2.2);
  else if(avg<10) ng.n1=_clamp(ng.n1*1.03,0.4,2.2);
  else ng.noiseScale=_clamp(ng.noiseScale*0.97,0.4,2.2);
  return ng;
}

// ── INIT ──────────────────────────────────────────────────────
function init(g){
  particles.forEach(p=>scene.remove(p.mesh)); particles=[];
  const n=Math.round(BC.nBase*(0.95+0.2*Math.random()));
  const nTypes=BC.types.length;
  const counts=BC.ratios.map((r,i)=>Math.round(r*n));
  counts[0]=n-counts.slice(1).reduce((a,b)=>a+b,0);
  for(let ti=0;ti<nTypes;ti++){
    for(let k=0;k<counts[ti];k++){
      const phi=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2;
      const r=BC.worldR*0.78*Math.cbrt(Math.random());
      const x=r*Math.sin(phi)*Math.cos(th),y=r*Math.sin(phi)*Math.sin(th),z=r*Math.cos(phi);
      const sp=BC.thermalNoise*2.5;
      const mesh=new THREE.Mesh(sGeos[ti],sMats[ti]);
      mesh.position.set(x,y,z); scene.add(mesh);
      particles.push({x,y,z,vx:(Math.random()-0.5)*sp,vy:(Math.random()-0.5)*sp,vz:(Math.random()-0.5)*sp,type:ti,mesh,bonds:new Set(),id:particles.length});
    }
  }
  _tick=0; uiTick=0; tierHistory=[]; _stagnTicks=0; _lastTierVal=0;
  _intActive=false; _intTick=0; _intIdx=0;
  document.getElementById('int-panel').style.display='none';
}

// ── PHYSICS ──────────────────────────────────────────────────
function physicsStep(g){
  const n=particles.length, dt=0.55;
  const eps=0.025*(g.n2||1), ns=BC.thermalNoise*(g.noiseScale||1);
  const fx=new Float32Array(n),fy=new Float32Array(n),fz=new Float32Array(n);
  const sig=BC.ljSig;

  for(let i=0;i<n-1;i++){
    const pi=particles[i];
    for(let j=i+1;j<n;j++){
      const pj=particles[j];
      if(pi.bonds.has(j)) continue;
      const dx=pj.x-pi.x,dy=pj.y-pi.y,dz=pj.z-pi.z;
      const r2=dx*dx+dy*dy+dz*dz; if(r2<1) continue;
      const r=Math.sqrt(r2);
      if(r<7){const f=-0.45/r2;fx[i]+=f*dx;fy[i]+=f*dy;fz[i]+=f*dz;fx[j]-=f*dx;fy[j]-=f*dy;fz[j]-=f*dz;continue;}
      if(r<36){
        const sr6=Math.pow(sig/r,6);
        const aff=BC.affinity[pi.type][pj.type]*(g.n1||1);
        const f=24*eps*aff/r2*(2*sr6*sr6-sr6);
        fx[i]+=f*dx;fy[i]+=f*dy;fz[i]+=f*dz;fx[j]-=f*dx;fy[j]-=f*dy;fz[j]-=f*dz;
      }
    }
  }
  for(let i=0;i<n;i++){
    const pi=particles[i];
    for(const j of pi.bonds){
      if(j<=i) continue;
      const pj=particles[j];
      const dx=pj.x-pi.x,dy=pj.y-pi.y,dz=pj.z-pi.z;
      const r=Math.sqrt(dx*dx+dy*dy+dz*dz); if(r<0.1) continue;
      if(r>BC.bondBreak){pi.bonds.delete(j);pj.bonds.delete(i);continue;}
      const f=BC.bondSpring*(g.n2||1)*(r-BC.bondRest)/r;
      fx[i]+=f*dx;fy[i]+=f*dy;fz[i]+=f*dz;fx[j]-=f*dx;fy[j]-=f*dy;fz[j]-=f*dz;
    }
  }
  for(let i=0;i<n;i++){
    const pi=particles[i];
    pi.vx+=(Math.random()-0.5)*ns+fx[i]*dt;
    pi.vy+=(Math.random()-0.5)*ns+fy[i]*dt;
    pi.vz+=(Math.random()-0.5)*ns+fz[i]*dt;
    const damp=0.968-0.006*(g.n3||1);
    pi.vx*=damp;pi.vy*=damp;pi.vz*=damp;
    const spd=Math.sqrt(pi.vx*pi.vx+pi.vy*pi.vy+pi.vz*pi.vz);
    if(spd>4.0){const s=4.0/spd;pi.vx*=s;pi.vy*=s;pi.vz*=s;}
    pi.x+=pi.vx*dt;pi.y+=pi.vy*dt;pi.z+=pi.vz*dt;
    // Soft wall + gentle central pull
    const dist=Math.sqrt(pi.x*pi.x+pi.y*pi.y+pi.z*pi.z);
    if(dist>BC.worldR-4){const ex=dist-(BC.worldR-4),f=BC.wallK*ex/dist;pi.vx-=f*pi.x;pi.vy-=f*pi.y;pi.vz-=f*pi.z;}
    // Gentle inward pull beyond 65% of radius (keeps density high near center)
    if(dist>BC.worldR*0.65){const f=0.003*(dist-BC.worldR*0.65)/dist;pi.vx-=f*pi.x;pi.vy-=f*pi.y;pi.vz-=f*pi.z;}
    pi.mesh.position.set(pi.x,pi.y,pi.z);
  }
}

function updateBonds(g){
  const n=particles.length,rate=BC.bondRate*(g.n1||1);
  for(let i=0;i<n-1;i++){
    const pi=particles[i];if(pi.bonds.size>=BC.types[pi.type][3]) continue;
    for(let j=i+1;j<n;j++){
      const pj=particles[j];
      if(pj.bonds.size>=BC.types[pj.type][3]||pi.bonds.has(j)) continue;
      const dx=pj.x-pi.x,dy=pj.y-pi.y,dz=pj.z-pi.z;
      if(dx*dx+dy*dy+dz*dz>BC.bondCut*BC.bondCut) continue;
      if(Math.random()<BC.affinity[pi.type][pj.type]*rate){pi.bonds.add(j);pj.bonds.add(i);}
    }
  }
}

function renderBonds(){
  let idx=0;
  for(let i=0;i<particles.length&&idx<MAX_BL;i++){
    const pi=particles[i];
    for(const j of pi.bonds){
      if(j<=i||idx>=MAX_BL) continue;
      const pj=particles[j];
      bPos[idx*6]=pi.x;bPos[idx*6+1]=pi.y;bPos[idx*6+2]=pi.z;
      bPos[idx*6+3]=pj.x;bPos[idx*6+4]=pj.y;bPos[idx*6+5]=pj.z;
      idx++;
    }
  }
  bGeo.attributes.position.needsUpdate=true;
  bGeo.setDrawRange(0,idx*2);
}

// ── STRUCTURE DETECTION ──────────────────────────────────────
function getComponents(){
  const n=particles.length,vis=new Int8Array(n),comps=[];
  for(let s=0;s<n;s++){
    if(vis[s]) continue;
    const comp=[],q=[s];vis[s]=1;
    while(q.length){const c=q.shift();comp.push(c);for(const nb of particles[c].bonds){if(!vis[nb]){vis[nb]=1;q.push(nb);}}}
    comps.push(comp);
  }
  return comps;
}
function compHasCycle(comp){
  const inC=new Set(comp),vis=new Set();
  function dfs(n,p){vis.add(n);for(const nb of particles[n].bonds){if(!inC.has(nb))continue;if(!vis.has(nb)){if(dfs(nb,n))return true;}else if(nb!==p)return true;}return false;}
  return dfs(comp[0],-1);
}
function compIsSpherical(comp){
  if(comp.length<8)return false;
  const ps=comp.map(i=>particles[i]);
  const cx=ps.reduce((s,p)=>s+p.x,0)/ps.length,cy=ps.reduce((s,p)=>s+p.y,0)/ps.length,cz=ps.reduce((s,p)=>s+p.z,0)/ps.length;
  const ds=ps.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2+(p.z-cz)**2));
  const mn=ds.reduce((s,d)=>s+d,0)/ds.length;
  return Math.sqrt(ds.reduce((s,d)=>s+(d-mn)**2,0)/ds.length)/Math.max(mn,1)<0.40&&mn>6;
}
function compIsMixed(comp){
  const types=new Set(comp.map(i=>particles[i].type));
  return types.size>=2;
}
function classifyComp(comp){
  const n=comp.length;
  if(n===1)return 'Monomer';
  if(n===2)return 'Dimer';
  const cyc=compHasCycle(comp),sph=compIsSpherical(comp),mix=compIsMixed(comp);
  if(n<=4&&!cyc)return 'Oligomer';
  if(n<=4&&cyc)return 'Small Ring';
  if(n<=9&&!cyc)return 'Polymer';
  if(n<=9&&cyc)return 'Macrocycle';
  if(n<=16&&!sph&&!cyc)return 'Branched Polymer';
  if(n<=16&&cyc)return 'Macrocycle';
  if(n<=20&&mix)return 'Mixed Assembly';
  if(n<=35&&sph)return 'Spherical Cluster';
  if(n<=35&&mix)return 'Complex Assembly';
  if(n<=60&&sph&&mix)return 'Proto-Compartment';
  if(n>60&&sph)return 'Enclosed Structure';
  if(n>35)return 'Dense Aggregate';
  return 'Complex Assembly';
}
const STRUCT_INFO={
  'Monomer':{icon:'●',color:'#5a8aaa',desc:'Single unbound molecule.'},
  'Dimer':{icon:'⬡',color:'#7aaa88',desc:'Two molecules sharing a bond.'},
  'Oligomer':{icon:'───',color:'#90c880',desc:'Short linear chain (3–4 units).'},
  'Small Ring':{icon:'△',color:'#c8a060',desc:'A closed 3-node ring.'},
  'Polymer':{icon:'═══',color:'#a8d898',desc:'Extended chain 5–9 units.'},
  'Macrocycle':{icon:'◯',color:'#d8b060',desc:'Large ring with interior cavity.'},
  'Branched Polymer':{icon:'⊕',color:'#80c880',desc:'Polymer with lateral branches.'},
  'Mixed Assembly':{icon:'◉',color:'#e8a030',desc:'Multi-type cluster — early organisation.'},
  'Spherical Cluster':{icon:'○',color:'#68b8d8',desc:'Dense spherical aggregate.'},
  'Complex Assembly':{icon:'✦',color:'#c870a0',desc:'Multi-component organised structure.'},
  'Proto-Compartment':{icon:'◎',color:'#60e0b0',desc:'Spherical mixed cluster — proto-membrane forming.'},
  'Dense Aggregate':{icon:'⬡',color:'#9080b8',desc:'Large disordered cluster.'},
  'Enclosed Structure':{icon:'⬤',color:'#f0f0d8',desc:'Large enclosed compartment — proto-cell candidate.'},
};
function detectStructures(){
  const comps=getComponents();let maxSz=0;
  comps.forEach(c=>{if(c.length>maxSz)maxSz=c.length;});
  const hasClosed=comps.some(c=>c.length>=18&&compIsSpherical(c)&&compIsMixed(c));
  const totalBd=particles.reduce((s,p)=>s+p.bonds.size,0)/2|0;
  comps.forEach(comp=>{const cls=classifyComp(comp);if(!discoveredStructures.has(cls)){discoveredStructures.set(cls,{tick:_tick,gen:currentGen,tier:currentTier});_addKeyEntry(cls);logE(`◈ ${cls} discovered`);}});
  _lastComps=comps;_lastMaxClus=maxSz;_lastTotalBd=totalBd;_lastClosed=hasClosed;
}
function _addKeyEntry(name){
  const info=STRUCT_INFO[name]||{icon:'?',color:'#aaa',desc:'Unknown.'};
  const ke=document.getElementById('key-entries');
  const empty=document.getElementById('key-empty');if(empty)empty.remove();
  const d=discoveredStructures.get(name);
  const el=document.createElement('div');el.className='key-entry';
  el.innerHTML=`<div class="key-icon" style="color:${info.color}">${info.icon}</div><div><div class="key-name" style="color:${info.color}">${name}</div><div class="key-desc">${info.desc}</div><div class="key-when">T${d.tier} · Gen ${d.gen} · Tick ${d.tick}</div></div>`;
  ke.appendChild(el);
}

// ── TIER SYSTEM ──────────────────────────────────────────────
let _flashLabel='',_flashTick=0,_sustainedGrad=0;
function checkTiers(){
  const mx=_lastMaxClus,bd=_lastTotalBd,comps=_lastComps,cl=_lastClosed;
  const t=currentTier;
  if(t<1&&bd>=2)                                                                  _setTier(1);
  if(t<2&&mx>=3)                                                                  _setTier(2);
  if(t<3&&mx>=6)                                                                  _setTier(3);
  if(t<4&&particles.some(p=>p.bonds.size>=3))                                     _setTier(4);
  if(t<5&&comps.some(c=>c.length>=4&&compHasCycle(c)))                            _setTier(5);
  if(t<6&&mx>=12)                                                                 _setTier(6);
  if(t<7&&comps.filter(c=>c.length>=4).length>=3)                                _setTier(7);
  if(t<8&&comps.some(c=>c.length>=10&&compIsMixed(c)))                            _setTier(8);
  if(t<9&&comps.some(c=>c.length>=16&&compIsMixed(c)))                            _setTier(9);
  if(t<10&&cl)                                                                    _setTier(10);
  if(t<11&&comps.some(c=>c.length>=32&&compIsSpherical(c)))                       _setTier(11);
  if(t<12&&comps.filter(c=>c.length>=18&&compIsSpherical(c)).length>=2)           _setTier(12);
  if(t<13&&comps.some(c=>c.length>=55&&compIsSpherical(c)))                       _setTier(13);
  if(t<14&&comps.filter(c=>c.length>=18&&compIsSpherical(c)).length>=3)           _setTier(14);
}
function _setTier(t){
  if(tierAchieved[t])return;tierAchieved[t]=true;currentTier=t;
  _flashLabel=`T${t} — ${BC.tierNames[t].toUpperCase()}`;_flashTick=uiTick;
  document.getElementById('v-tier').textContent=`T${t} — ${BC.tierNames[t]}`;
  tierHistory.push(t);drawTierGraph();logE(`▲ TIER ${t} — ${BC.tierNames[t]}`);
  _addAgentMsg(SCIENTISTS[uiTick%3],`Tier ${t} confirmed: ${BC.tierNames[t]}.`);
}
function checkGraduation(){
  if(currentTier>=13){_sustainedGrad++;if(_sustainedGrad>=2000&&!_deathRunning)_runDeathCycle('Evolutionary graduation — T13+ sustained');}
  else _sustainedGrad=0;
}

// ── INTERVENTIONS ────────────────────────────────────────────
let _stagnTicks=0,_lastTierVal=0,_intActive=false,_intTick=0,_intIdx=0;
let _ca2Active=false,_osmoActive=false,_intSave={};
const INTERVENTIONS=[
  {name:'Ca²⁺ Ion Flush',reagent:'CaCl₂',desc:'Calcium ions bridge polar head-groups, destabilising closed structures and inducing proto-fission.',
   apply(){_ca2Active=true;}},
  {name:'Reagent Injection',reagent:'Additional molecular precursors',desc:'Surplus reactive molecules increase encounter frequency and bonding probability.',
   apply(){
     const nAdd=18;
     for(let k=0;k<nAdd;k++){
       const ti=k%BC.types.length;
       const phi=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2,r=BC.worldR*0.5;
       const x=r*Math.sin(phi)*Math.cos(th),y=r*Math.sin(phi)*Math.sin(th),z=r*Math.cos(phi);
       const mesh=new THREE.Mesh(sGeos[ti],sMats[ti]);
       mesh.position.set(x,y,z);scene.add(mesh);
       particles.push({x,y,z,vx:0,vy:0,vz:0,type:ti,mesh,bonds:new Set(),id:particles.length});
     }
   }},
  {name:'Osmotic Shock',reagent:'Hypotonic solution',desc:'Rapid osmotic pressure differential forces structural reorganisation of assembled clusters.',
   apply(){_osmoActive=true;}},
  {name:'pH Alkaline Shift',reagent:'Alkaline buffer (pH 9.2)',desc:'Elevated pH modifies inter-molecular electrostatics, enabling tighter packing.',
   apply(){_intSave.n2=_genome.n2;_genome.n2=_clamp(_genome.n2*1.28,0.4,2.5);}},
  {name:'Energy Seeding',reagent:'High-energy precursors',desc:'Energised molecules catalyse template-directed polymerisation inside proto-compartments.',
   apply(){_intSave.n1=_genome.n1;_intSave.n3=_genome.n3;_genome.n1=_clamp(_genome.n1*1.20,0.4,2.5);_genome.n3=_clamp(_genome.n3*0.85,0.4,2.0);}},
];
function checkIntervention(){
  if(_isDead||_intActive)return;
  if(currentTier!==_lastTierVal){_lastTierVal=currentTier;_stagnTicks=0;return;}
  _stagnTicks++;
  if(currentTier>=2&&currentTier<8){
    if(_stagnTicks>=6000)_runDeathCycle(`evolutionary stagnation — T${currentTier} plateau`);
    return;
  }
  if(currentTier<2)return;
  if(_stagnTicks<500)return;
  if(_intIdx>=INTERVENTIONS.length*3){
    if(_stagnTicks>=2000)_runDeathCycle(`all interventions exhausted — T${currentTier} dead end`);
    return;
  }
  _triggerIntervention(_intIdx++);
}
function _triggerIntervention(idx){
  const iv=INTERVENTIONS[idx%INTERVENTIONS.length];
  _intSave={n1:_genome.n1,n2:_genome.n2,n3:_genome.n3,noiseScale:_genome.noiseScale};
  iv.apply();_intActive=true;_intTick=0;_stagnTicks=0;
  document.getElementById('int-name').textContent=iv.name;
  document.getElementById('int-desc').textContent=`${iv.reagent} — ${iv.desc}`;
  document.getElementById('int-fill').style.width='100%';
  document.getElementById('int-panel').style.display='block';
  logE(`⚗ ${iv.name}`);
  _addAgentMsg('⚗ INTERVENTION',`T${currentTier} stagnation. Deploying: ${iv.name}. ${iv.desc}`);
}
function tickIntervention(){
  if(!_intActive)return;_intTick++;
  document.getElementById('int-fill').style.width=((1-_intTick/250)*100).toFixed(1)+'%';
  if(_intTick>=250){
    if(_intSave.n1!==undefined)_genome.n1=_intSave.n1;
    if(_intSave.n2!==undefined)_genome.n2=_intSave.n2;
    if(_intSave.n3!==undefined)_genome.n3=_intSave.n3;
    _ca2Active=false;_osmoActive=false;_intActive=false;
    document.getElementById('int-panel').style.display='none';
  }
}

// ── VITALITY ────────────────────────────────────────────────
let _vTick=0;
function checkVitality(){
  if(currentTier>=5)return;
  if(++_vTick>=1200&&currentTier<2&&!_deathRunning)_runDeathCycle('Vitality failure — no chemistry after 1200 ticks');
}

// ── DEATH / GENERATION ──────────────────────────────────────
async function _runDeathCycle(reason){
  if(_deathRunning)return;_deathRunning=true;_isDead=true;
  const ws=document.getElementById('world-state');
  ws.textContent='DEAD WORLD';ws.className='dead';
  const seed={positions:particles.map(p=>({x:p.x,y:p.y,z:p.z,type:p.type}))};
  const archive={generation:currentGen,maxTier:currentTier,
    tiers:tierAchieved.map((v,i)=>v?i:null).filter(v=>v!==null),
    genome:{..._genome},deathReason:reason,timestamp:Date.now(),
    structures:[...discoveredStructures.entries()].map(([k,v])=>({name:k,...v}))};
  await new Promise(r=>setTimeout(r,1500));ws.textContent='ARCHIVING…';
  const nextGen=currentGen+1;
  try{
    await db.ref(`${ROOT}/archives/${currentGen}`).set(archive);
    await db.ref(`${ROOT}/genome/${nextGen}/seed`).set(seed);
    await db.ref(`${ROOT}/genome/${currentGen}`).update({..._genome,maxTier:currentTier});
    await db.ref(`${ROOT}/currentGeneration`).set(nextGen);
  }catch(e){console.warn('Archive:',e);}
  await new Promise(r=>setTimeout(r,2000));ws.textContent='EVOLVING…';
  let archives=[];
  try{const s=await db.ref(`${ROOT}/archives`).once('value');if(s.val())archives=Object.values(s.val());}catch(e){}
  _genome=_evolveGenome(archives,_genome);
  await new Promise(r=>setTimeout(r,1000));
  ws.className='';ws.textContent='';ws.style.opacity='0';
  currentGen=nextGen;currentTier=0;tierAchieved=new Array(21).fill(false);
  discoveredStructures.clear();
  document.getElementById('key-entries').innerHTML='<div id="key-empty">No structures detected yet…</div>';
  document.getElementById('v-gen').textContent=`GEN ${currentGen}`;
  document.getElementById('v-tier').textContent=`T0 — ${BC.tierNames[0]}`;
  _deathRunning=false;_isDead=false;_sustainedGrad=0;_vTick=0;
  const sSnap=await db.ref(`${ROOT}/genome/${currentGen}/seed`).once('value');
  if(sSnap.val()&&sSnap.val().positions){
    const saved=sSnap.val().positions;
    particles.forEach(p=>scene.remove(p.mesh));particles=[];
    saved.forEach((s,i)=>{const mesh=new THREE.Mesh(sGeos[s.type<BC.types.length?s.type:0],sMats[s.type<BC.types.length?s.type:0]);mesh.position.set(s.x,s.y,s.z);scene.add(mesh);particles.push({x:s.x,y:s.y,z:s.z,vx:0,vy:0,vz:0,type:s.type<BC.types.length?s.type:0,mesh,bonds:new Set(),id:i});});
    _tick=0;uiTick=0;tierHistory=[];_stagnTicks=0;_lastTierVal=0;_intActive=false;_intIdx=0;
    _addAgentMsg('🧬 NEW GENERATION',`Gen ${currentGen} seeded from inherited positions. Genome evolved from ${archives.length} archive entries.`);
  }else{init(_genome);}
}

// ── HUD ────────────────────────────────────────────────────
const SCIENTISTS=['Dr. Ayasha Okafor','Dr. Lienhard Brun','Dr. Suri Mura'];
const _elog=[];
function logE(msg){_elog.unshift(msg);if(_elog.length>5)_elog.pop();document.getElementById('elog').innerHTML=_elog.map(m=>`<div>${m}</div>`).join('');}
function _addAgentMsg(name,text){
  const panel=document.getElementById('agent-msgs');
  const div=document.createElement('div');div.className='a-msg';
  div.innerHTML=`<div class="a-name">${name}</div>${text}`;
  panel.insertBefore(div,panel.firstChild);
  while(panel.children.length>8)panel.removeChild(panel.lastChild);
}
function drawTierGraph(){
  const c=document.getElementById('gc'),ctx=c.getContext('2d');
  const W=242,H=80,PAD=6;
  ctx.clearRect(0,0,W,H);
  if(tierHistory.length<2)return;
  const pts=tierHistory.map((t,i)=>({
    x:PAD+(i/(tierHistory.length-1))*(W-PAD*2),
    y:(H-PAD)-(t/20)*(H-PAD*2)
  }));
  // Fill gradient under curve
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(60,160,240,0.25)');
  grad.addColorStop(1,'rgba(60,160,240,0.02)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x,H-PAD);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-PAD);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.strokeStyle='rgba(80,180,240,0.85)';ctx.lineWidth=1.5;ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();
  // Current tier dot
  const last=pts[pts.length-1];
  ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2);
  ctx.fillStyle='rgba(130,220,255,0.9)';ctx.fill();
  // Tier label
  ctx.fillStyle='rgba(100,170,215,0.65)';ctx.font='9px Courier New';
  ctx.fillText(`T${tierHistory[tierHistory.length-1]}`,last.x+5,last.y+3);
}

// ── MAIN LOOP ───────────────────────────────────────────────
// ── Firebase state sync ─────────────────────────────────────
let _lastSavedTier=-1;
function saveState(){
  try{
    const cx=particles.length>0?(_lastTotalBd/(particles.length+0.001)).toFixed(3):0;
    db.ref(`${ROOT}/state`).set({
      currentTier,
      worldStatus:_isDead?'dead':'active',
      complexity:parseFloat(cx),
      lastUpdated:Date.now(),
      tick:_tick,
      generation:currentGen
    });
    _lastSavedTier=currentTier;
  }catch(e){}
}

const STEPS=3;
function animate(){
  requestAnimationFrame(animate);
  if(_isDead){controls.update();renderer.render(scene,camera);return;}
  for(let s=0;s<STEPS;s++){
    physicsStep(_genome);
    if(_tick%3===0)updateBonds(_genome);
    _tick++;
  }
  uiTick++;renderBonds();
  if(_tick%160<STEPS){detectStructures();checkTiers();}
  checkGraduation();checkVitality();checkIntervention();tickIntervention();
  // Save to Firebase every ~300 uiTicks OR immediately on tier change
  if(uiTick%300===0||currentTier!==_lastSavedTier) saveState();
  if(uiTick%15===0){
    document.getElementById('v-tick').textContent=_tick;
    document.getElementById('v-np').textContent=particles.length;
    document.getElementById('v-nb').textContent=_lastTotalBd;
    document.getElementById('v-mx').textContent=_lastMaxClus;
  }
  const ws=document.getElementById('world-state');
  if(_flashLabel&&uiTick-_flashTick<130){ws.textContent=_flashLabel;ws.className='flash';ws.style.opacity='1';}
  else if(_flashLabel){_flashLabel='';ws.className='';ws.textContent='';ws.style.opacity='0';}
  controls.update();renderer.render(scene,camera);
}

// ── FIREBASE RESUME ─────────────────────────────────────────
const _sciLoad={done:false};
setTimeout(async function _pandoraResume(){
  try{
    const genSnap=await db.ref(`${ROOT}/currentGeneration`).once('value');
    currentGen=genSnap.val()||1;
    const gSnap=await db.ref(`${ROOT}/genome/${currentGen}`).once('value');
    if(gSnap.val()){_genome={...defGenome(),...gSnap.val()};delete _genome.seed;delete _genome.maxTier;}
    const sSnap=await db.ref(`${ROOT}/genome/${currentGen}/seed`).once('value');
    if(sSnap.val()&&sSnap.val().positions){
      const saved=sSnap.val().positions;
      particles.forEach(p=>scene.remove(p.mesh));particles=[];
      saved.forEach((s,i)=>{const t=s.type<BC.types.length?s.type:0;const mesh=new THREE.Mesh(sGeos[t],sMats[t]);mesh.position.set(s.x,s.y,s.z);scene.add(mesh);particles.push({x:s.x,y:s.y,z:s.z,vx:0,vy:0,vz:0,type:t,mesh,bonds:new Set(),id:i});});
      _tick=0;uiTick=0;_addAgentMsg('🔄 RESUME',`Gen ${currentGen} restored (${saved.length} particles).`);
    }else{
      init(_genome);
      _addAgentMsg('🌱 GENESIS',`Gen ${currentGen} initialized — ${particles.length} molecules seeded. The experiment begins.`);
    }
    document.getElementById('v-gen').textContent=`GEN ${currentGen}`;
    animate();
  }catch(e){console.error('Resume failed:',e);init(_genome);animate();}
},800);

setTimeout(async function _loadScientistMemory(){
  if(currentGen<2)return;
  try{
    const snap=await db.ref(`${ROOT}/archives`).once('value');
    if(!snap.val())return;
    const archs=Object.values(snap.val());
    const maxT=Math.max(...archs.map(a=>a.maxTier||0));
    const avgT=(archs.reduce((s,a)=>s+(a.maxTier||0),0)/archs.length).toFixed(1);
    _addAgentMsg(SCIENTISTS[0],`Archive briefing — ${archs.length} generations. Peak T${maxT}, avg T${avgT}.`);
    if(maxT>=8)_addAgentMsg(SCIENTISTS[1],`Mixed-type order achieved historically. Reinforcing bonding parameters.`);
    if(maxT>=10)_addAgentMsg(SCIENTISTS[2],`Compartmentalisation confirmed in history. Intervention protocols on standby.`);
  }catch(e){}
},5200);
</script>
